<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bagl Examples</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        background-color: #1a1a1a;
        color: #e0e0e0;
        display: flex;
        height: 100vh;
        overflow: hidden;
      }

      #sidebar {
        width: 280px;
        background-color: #2d2d2d;
        color: #e0e0e0;
        overflow-y: auto;
        border-right: 1px solid #1a1a1a;
        display: flex;
        flex-direction: column;
      }

      #sidebar-header {
        padding: 24px 20px;
        border-bottom: 1px solid #404040;
        background-color: #252525;
      }

      #sidebar-header h1 {
        font-size: 20px;
        font-weight: 600;
        color: #fff;
        margin-bottom: 4px;
      }

      #sidebar-header p {
        font-size: 12px;
        color: #999;
      }

      #sidebar-nav {
        flex: 1;
        padding: 12px 0;
      }

      .nav-item {
        display: block;
        padding: 8px 20px;
        color: #e0e0e0;
        text-decoration: none;
        transition: all 0.2s;
        border-left: 3px solid transparent;
        cursor: pointer;
        font-size: 14px;
      }

      .nav-item:hover {
        background-color: #353535;
        color: #fff;
      }

      .nav-item.active {
        background-color: #1a1a1a;
        border-left-color: #4a9eff;
        color: #4a9eff;
        font-weight: 500;
      }

      #content {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow-y: auto;
        padding: 32px;
      }

      #content-header {
        margin-bottom: 24px;
      }

      #content-header h2 {
        font-size: 28px;
        font-weight: 600;
        color: #fff;
        margin-bottom: 8px;
      }

      #context-info {
        font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
        font-size: 13px;
        color: #b0b0b0;
        background-color: #2d2d2d;
        padding: 8px 12px;
        border-radius: 4px;
        display: inline-block;
      }

      #canvas-container {
        background-color: #252525;
        border-radius: 8px;
        padding: 24px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        margin-bottom: 24px;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 400px;
      }

      canvas {
        border: 1px solid #404040;
        border-radius: 4px;
        display: block;
        max-width: 100%;
        height: auto;
      }

      #controls {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
      }

      button {
        padding: 10px 20px;
        background-color: #4a9eff;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: background-color 0.2s;
      }

      button:hover {
        background-color: #3a8eef;
      }

      button:active {
        background-color: #2a7edf;
      }

      #debug-div {
        font-family: 'Monaco', 'Menlo', 'Ubuntu Mono', monospace;
        font-size: 12px;
        background-color: rgba(0, 0, 0, 0.85);
        color: #0f0;
        padding: 16px;
        border-radius: 6px;
        white-space: pre-wrap;
        word-wrap: break-word;
        overflow: auto;
        max-height: 400px;
        margin-top: 24px;
        border: 1px solid #333;
      }

      /* Scrollbar styling for sidebar */
      #sidebar::-webkit-scrollbar {
        width: 8px;
      }

      #sidebar::-webkit-scrollbar-track {
        background: #252525;
      }

      #sidebar::-webkit-scrollbar-thumb {
        background: #555;
        border-radius: 4px;
      }

      #sidebar::-webkit-scrollbar-thumb:hover {
        background: #666;
      }

      /* Scrollbar styling for content area */
      #content::-webkit-scrollbar {
        width: 8px;
      }

      #content::-webkit-scrollbar-track {
        background: #1a1a1a;
      }

      #content::-webkit-scrollbar-thumb {
        background: #555;
        border-radius: 4px;
      }

      #content::-webkit-scrollbar-thumb:hover {
        background: #666;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
